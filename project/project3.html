<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Smart Notes Sharing Platform | Study Smarter</title>
    <!-- Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #0f0f1a;
        color: #ffffff;
        overflow-x: hidden;
      }

      /* Animated Gradient Background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(0, 217, 255, 0.1),
            transparent 60%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(139, 92, 246, 0.1),
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* Floating Particles Canvas */
      #particles-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 2;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 5%;
      }

      /* Glassmorphism */
      .glass-card {
        background: rgba(22, 22, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 217, 255, 0.2);
        border-radius: 28px;
        transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }

      .glass-card:hover {
        transform: translateY(-8px);
        border-color: #00d9ff;
        box-shadow: 0 20px 35px -12px rgba(0, 217, 255, 0.25);
      }

      /* Neon Buttons */
      .neon-btn {
        background: linear-gradient(135deg, #00d9ff, #8b5cf6);
        border: none;
        color: white;
        font-weight: 600;
        padding: 12px 28px;
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 8px rgba(0, 217, 255, 0.4);
        font-size: 0.95rem;
      }

      .neon-btn:hover {
        transform: scale(1.05);
        box-shadow:
          0 0 20px #00d9ff,
          0 0 8px #8b5cf6;
      }

      .btn-outline {
        background: transparent;
        border: 1.5px solid #00d9ff;
        box-shadow: none;
      }

      .btn-outline:hover {
        background: rgba(0, 217, 255, 0.1);
        box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
      }

      /* Navbar */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        flex-wrap: wrap;
        gap: 20px;
      }

      .logo {
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, #00d9ff, #8b5cf6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .nav-links {
        display: flex;
        gap: 30px;
        align-items: center;
        flex-wrap: wrap;
      }

      .nav-links a {
        color: #cfcfcf;
        text-decoration: none;
        transition: 0.2s;
        font-weight: 500;
        cursor: pointer;
      }

      .nav-links a:hover {
        color: #00d9ff;
      }

      /* Hero Section */
      .hero {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding: 60px 0 80px;
        gap: 40px;
      }

      .hero-content {
        flex: 1;
      }

      .hero-content h1 {
        font-size: 3.5rem;
        line-height: 1.2;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #fff, #00d9ff, #8b5cf6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .hero-buttons {
        display: flex;
        gap: 20px;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      .hero-illustration {
        flex: 1;
        text-align: center;
        font-size: 8rem;
        opacity: 0.8;
      }

      /* Search Bar Animation */
      .search-container {
        margin: 30px 0;
      }

      .search-bar {
        display: flex;
        background: rgba(22, 22, 42, 0.8);
        border-radius: 60px;
        border: 1px solid rgba(0, 217, 255, 0.3);
        transition: all 0.4s ease;
      }

      .search-bar:focus-within {
        transform: scale(1.02);
        border-color: #00d9ff;
        box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
      }

      .search-bar input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 16px 24px;
        color: white;
        font-size: 1rem;
        outline: none;
      }

      .search-bar button {
        background: linear-gradient(135deg, #00d9ff, #8b5cf6);
        border: none;
        border-radius: 60px;
        padding: 0 28px;
        cursor: pointer;
        color: white;
        font-weight: 600;
      }

      /* Filter chips */
      .filter-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 20px 0;
      }

      .chip {
        background: rgba(22, 22, 42, 0.8);
        padding: 8px 20px;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid rgba(0, 217, 255, 0.3);
        font-size: 0.85rem;
      }

      .chip.active,
      .chip:hover {
        background: linear-gradient(135deg, #00d9ff, #8b5cf6);
        border-color: transparent;
      }

      /* Notes Grid */
      .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
        margin: 40px 0;
      }

      .note-card {
        background: rgba(22, 22, 42, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 20px;
        transition: all 0.3s ease;
        border: 1px solid rgba(0, 217, 255, 0.15);
      }

      .note-card:hover {
        transform: translateY(-6px);
        border-color: #00d9ff;
        box-shadow: 0 15px 30px -10px rgba(0, 217, 255, 0.2);
      }

      .note-icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }

      .note-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .note-meta {
        display: flex;
        justify-content: space-between;
        color: #cfcfcf;
        font-size: 0.8rem;
        margin: 12px 0;
      }

      .download-btn {
        background: rgba(0, 217, 255, 0.15);
        border: 1px solid #00d9ff;
        padding: 8px 16px;
        border-radius: 30px;
        width: 100%;
        cursor: pointer;
        transition: 0.2s;
        color: white;
        font-weight: 600;
      }

      .download-btn:hover {
        background: #00d9ff;
        box-shadow: 0 0 12px #00d9ff;
      }

      /* Upload Progress */
      .upload-area {
        border: 2px dashed rgba(0, 217, 255, 0.4);
        border-radius: 28px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
      }

      .upload-area:hover {
        border-color: #00d9ff;
        background: rgba(0, 217, 255, 0.05);
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 15px;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #00d9ff, #8b5cf6);
        transition: width 0.5s ease;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(12px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: #16162a;
        border-radius: 32px;
        padding: 35px;
        max-width: 500px;
        width: 90%;
        border: 1px solid #00d9ff;
      }

      .modal-content input,
      .modal-content select {
        background: rgba(22, 22, 42, 0.9);
        border: 1px solid #00d9ff;
        border-radius: 20px;
        padding: 12px 16px;
        color: white;
        width: 100%;
        margin: 10px 0;
      }

      /* Dashboard */
      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px;
        margin-top: 30px;
      }

      .file-item {
        background: rgba(0, 217, 255, 0.08);
        padding: 12px;
        border-radius: 20px;
        margin: 8px 0;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .hero-content h1 {
          font-size: 2.2rem;
        }
        .hero-illustration {
          font-size: 4rem;
        }
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .nav-links {
          justify-content: center;
        }
      }

      /* Loading Animation */
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0f0f1a;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s;
      }
      .spinner {
        width: 55px;
        height: 55px;
        border: 4px solid #00d9ff;
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: spin 0.8s infinite linear;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      footer {
        text-align: center;
        padding: 40px 0 30px;
        border-top: 1px solid rgba(0, 217, 255, 0.2);
        margin-top: 60px;
      }

      .user-badge {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0, 217, 255, 0.15);
        padding: 8px 18px;
        border-radius: 40px;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <canvas id="particles-canvas"></canvas>

    <div class="container">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="logo"><i class="fas fa-graduation-cap"></i> SmartNotes</div>
        <div class="nav-links">
          <a onclick="showSection('home')">Home</a>
          <a onclick="showSection('features')">Features</a>
          <a onclick="showSection('about')">About</a>
          <a onclick="showSection('contact')">Contact</a>
          <div id="authContainer"></div>
        </div>
      </nav>

      <!-- Dynamic Main Content -->
      <main id="mainContent"></main>

      <footer>
        <p>
          © 2026 Smart Notes Sharing Platform | Study Smarter, Not Harder ✨
        </p>
        <div style="margin-top: 15px">
          <i class="fab fa-github"></i>  <i class="fab fa-linkedin"></i>  <i
            class="fab fa-twitter"
          ></i>
        </div>
      </footer>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
      <div class="modal-content">
        <h2 style="margin-bottom: 20px">
          <i class="fas fa-cloud-upload-alt"></i> Upload Notes
        </h2>
        <div class="upload-area" id="uploadArea">
          <i class="fas fa-file-upload" style="font-size: 3rem"></i>
          <p>Click or drag file (PDF, DOCX, PPT, TXT)</p>
          <input
            type="file"
            id="fileInput"
            accept=".pdf,.docx,.ppt,.pptx,.txt"
            style="display: none"
          />
        </div>
        <div class="progress-bar" id="progressContainer" style="display: none">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div style="margin-top: 20px">
          <input
            type="text"
            id="noteTitleUpload"
            placeholder="Note Title"
            required
          />
          <select id="noteSubjectUpload">
            <option value="Programming">Programming</option>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="DBMS">DBMS</option>
            <option value="Web Development">Web Development</option>
            <option value="Networking">Networking</option>
            <option value="Maths">Maths</option>
            <option value="English">English</option>
          </select>
          <button
            class="neon-btn"
            id="confirmUploadBtn"
            style="width: 100%; margin-top: 10px"
          >
            Confirm Upload
          </button>
        </div>
        <button
          onclick="closeModal()"
          style="background: transparent; margin-top: 15px; cursor: pointer"
        >
          Cancel
        </button>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
      <div class="modal-content">
        <h2 style="margin-bottom: 20px">
          <i class="fas fa-lock"></i> Login to SmartNotes
        </h2>
        <input type="email" id="loginEmail" placeholder="Email Address" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button
          class="neon-btn"
          id="doLoginBtn"
          style="width: 100%; margin: 10px 0"
        >
          Login
        </button>
        <p style="text-align: center; margin: 15px 0; color: #cfcfcf">
          Demo Credentials:
        </p>
        <p style="text-align: center; font-size: 0.9rem">
          📧 student@college.com | 🔑 pass123
        </p>
        <p style="text-align: center; font-size: 0.9rem">
          📧 teacher@college.com | 🔑 teach123
        </p>
        <button
          onclick="closeLoginModal()"
          style="
            background: transparent;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
          "
        >
          Close
        </button>
      </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal">
      <div class="modal-content">
        <h2 style="margin-bottom: 20px">
          <i class="fas fa-user-plus"></i> Create Account
        </h2>
        <input type="text" id="signupName" placeholder="Full Name" />
        <input type="email" id="signupEmail" placeholder="Email Address" />
        <input type="password" id="signupPassword" placeholder="Password" />
        <select id="signupRole">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
        <button
          class="neon-btn"
          id="doSignupBtn"
          style="width: 100%; margin: 10px 0"
        >
          Sign Up
        </button>
        <button
          onclick="closeSignupModal()"
          style="
            background: transparent;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
          "
        >
          Close
        </button>
      </div>
    </div>

    <script>
      // ========== DATABASE (LocalStorage) ==========
      let currentUser =
        JSON.parse(localStorage.getItem("smartnotes_user")) || null;

      // Initialize users if not exists
      if (!localStorage.getItem("smartnotes_users")) {
        const defaultUsers = [
          {
            id: 1,
            name: "Alex Student",
            email: "student@college.com",
            password: "pass123",
            role: "student",
            joinDate: "2026-01-15",
          },
          {
            id: 2,
            name: "Prof. Sharma",
            email: "teacher@college.com",
            password: "teach123",
            role: "teacher",
            joinDate: "2026-01-10",
          },
        ];
        localStorage.setItem("smartnotes_users", JSON.stringify(defaultUsers));
      }

      // Initialize notes
      if (!localStorage.getItem("smartnotes_notes")) {
        const defaultNotes = [
          {
            id: 1,
            title: "Python Complete Guide",
            subject: "Python",
            uploader: "Prof. Sharma",
            uploaderId: 2,
            fileSize: "2.4 MB",
            date: "2026-04-15",
            fileName: "python_guide.pdf",
            type: "pdf",
            downloads: 45,
          },
          {
            id: 2,
            title: "DBMS Normalization Notes",
            subject: "DBMS",
            uploader: "Alex Student",
            uploaderId: 1,
            fileSize: "1.1 MB",
            date: "2026-04-10",
            fileName: "dbms_notes.pdf",
            type: "pdf",
            downloads: 28,
          },
          {
            id: 3,
            title: "Java OOP Concepts",
            subject: "Java",
            uploader: "Prof. Sharma",
            uploaderId: 2,
            fileSize: "3.2 MB",
            date: "2026-04-05",
            fileName: "java_oop.pdf",
            type: "pdf",
            downloads: 62,
          },
          {
            id: 4,
            title: "Web Development Bootcamp",
            subject: "Web Development",
            uploader: "Alex Student",
            uploaderId: 1,
            fileSize: "5.1 MB",
            date: "2026-04-12",
            fileName: "webdev.pptx",
            type: "pptx",
            downloads: 34,
          },
        ];
        localStorage.setItem("smartnotes_notes", JSON.stringify(defaultNotes));
      }

      // Initialize download history
      if (!localStorage.getItem("download_history")) {
        localStorage.setItem("download_history", JSON.stringify([]));
      }

      function getUsers() {
        return JSON.parse(localStorage.getItem("smartnotes_users"));
      }
      function getNotes() {
        return JSON.parse(localStorage.getItem("smartnotes_notes"));
      }
      function saveNotes(notes) {
        localStorage.setItem("smartnotes_notes", JSON.stringify(notes));
      }
      function saveUsers(users) {
        localStorage.setItem("smartnotes_users", JSON.stringify(users));
      }

      let selectedFilter = "All";

      // ========== AUTH FUNCTIONS ==========
      function updateAuthUI() {
        const authContainer = document.getElementById("authContainer");
        if (currentUser) {
          authContainer.innerHTML = `
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span>${currentUser.name}</span>
                    <button onclick="logout()" style="background:transparent; border:none; color:#00d9ff; cursor:pointer;">Logout</button>
                </div>
            `;
        } else {
          authContainer.innerHTML = `
                <button class="neon-btn" style="padding: 8px 20px;" onclick="showLoginModal()">Login</button>
                <button class="btn-outline neon-btn" style="padding: 8px 20px;" onclick="showSignupModal()">Signup</button>
            `;
        }
      }

      function showLoginModal() {
        document.getElementById("loginModal").style.display = "flex";
      }

      function closeLoginModal() {
        document.getElementById("loginModal").style.display = "none";
      }

      function showSignupModal() {
        document.getElementById("signupModal").style.display = "flex";
      }

      function closeSignupModal() {
        document.getElementById("signupModal").style.display = "none";
      }

      function logout() {
        currentUser = null;
        localStorage.removeItem("smartnotes_user");
        updateAuthUI();
        showSection("home");
        gsap.to("#mainContent", {
          opacity: 0,
          duration: 0.2,
          onComplete: () => {
            renderHomePage();
            gsap.to("#mainContent", { opacity: 1, duration: 0.5 });
          },
        });
      }

      // Handle Login
      document.getElementById("doLoginBtn")?.addEventListener("click", () => {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const users = getUsers();
        const user = users.find(
          (u) => u.email === email && u.password === password,
        );

        if (user) {
          currentUser = user;
          localStorage.setItem("smartnotes_user", JSON.stringify(user));
          updateAuthUI();
          closeLoginModal();
          showSection("dashboard");
          gsap.to("#mainContent", {
            opacity: 0,
            duration: 0.2,
            onComplete: () => {
              renderDashboard();
              gsap.to("#mainContent", { opacity: 1, duration: 0.5 });
            },
          });
        } else {
          alert("Invalid credentials! Use student@college.com / pass123");
        }
      });

      // Handle Signup
      document.getElementById("doSignupBtn")?.addEventListener("click", () => {
        const name = document.getElementById("signupName").value;
        const email = document.getElementById("signupEmail").value;
        const password = document.getElementById("signupPassword").value;
        const role = document.getElementById("signupRole").value;

        if (!name || !email || !password) {
          alert("Please fill all fields");
          return;
        }

        const users = getUsers();
        if (users.find((u) => u.email === email)) {
          alert("Email already exists!");
          return;
        }

        const newUser = {
          id: users.length + 1,
          name: name,
          email: email,
          password: password,
          role: role,
          joinDate: new Date().toISOString().slice(0, 10),
        };
        users.push(newUser);
        saveUsers(users);
        alert("Account created successfully! Please login.");
        closeSignupModal();
        showLoginModal();
      });

      // ========== RENDER FUNCTIONS ==========
      function renderHomePage() {
        const notes = getNotes();
        const filteredNotes =
          selectedFilter === "All"
            ? notes
            : notes.filter((n) => n.subject === selectedFilter);

        document.getElementById("mainContent").innerHTML = `
            <section class="hero">
                <div class="hero-content" data-aos="fade-right">
                    <h1>Smart Notes <br>Sharing Platform</h1>
                    <p style="font-size:1.1rem; color:#cfcfcf;">Share and Access Study Notes Instantly — from anywhere, anytime.</p>
                    <div class="hero-buttons">
                        ${currentUser ? `<button class="neon-btn" onclick="showUploadModal()"><i class="fas fa-cloud-upload-alt"></i> Upload Notes</button>` : `<button class="neon-btn" onclick="showLoginModal()"><i class="fas fa-cloud-upload-alt"></i> Login to Upload</button>`}
                        <button class="neon-btn btn-outline" onclick="document.getElementById('notesSection').scrollIntoView({behavior:'smooth'})">Explore Notes</button>
                    </div>
                </div>
                <div class="hero-illustration" data-aos="fade-left">
                    <i class="fas fa-book-open"></i>
                </div>
            </section>

            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by title, subject, uploader...">
                    <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
                </div>
                <div class="filter-chips" id="filterChips">
                    ${["All", "Programming", "Python", "Java", "DBMS", "Web Development", "Networking", "Maths", "English"].map((cat) => `<div class="chip ${selectedFilter === cat ? "active" : ""}" data-filter="${cat}">${cat}</div>`).join("")}
                </div>
            </div>

            <h2 id="notesSection"><i class="fas fa-file-alt"></i> Latest Notes</h2>
            <div class="notes-grid" id="notesGrid"></div>
        `;

        renderNotesGrid(filteredNotes, "");

        // Search functionality
        const searchBtn = document.getElementById("searchBtn");
        const searchInput = document.getElementById("searchInput");
        const performSearch = () => {
          gsap.to(".search-bar", {
            scale: 1.02,
            duration: 0.2,
            yoyo: true,
            repeat: 1,
          });
          const searchTerm = searchInput.value;
          const filtered =
            selectedFilter === "All"
              ? notes
              : notes.filter((n) => n.subject === selectedFilter);
          const searched = filtered.filter(
            (n) =>
              n.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
              n.subject.toLowerCase().includes(searchTerm.toLowerCase()) ||
              n.uploader.toLowerCase().includes(searchTerm.toLowerCase()),
          );
          renderNotesGrid(searched, searchTerm);
        };
        searchBtn.addEventListener("click", performSearch);
        searchInput.addEventListener("keyup", (e) => {
          if (e.key === "Enter") performSearch();
        });

        // Filter chips
        document.querySelectorAll(".chip").forEach((chip) => {
          chip.addEventListener("click", () => {
            selectedFilter = chip.getAttribute("data-filter");
            renderHomePage();
          });
        });
      }

      function renderNotesGrid(notesToShow, searchTerm) {
        const notesGrid = document.getElementById("notesGrid");
        if (notesToShow.length === 0) {
          notesGrid.innerHTML =
            '<div class="glass-card" style="padding:40px; text-align:center;">📭 No notes found. Be the first to upload!</div>';
          return;
        }
        notesGrid.innerHTML = notesToShow
          .map(
            (note) => `
            <div class="note-card">
                <div class="note-icon"><i class="fas fa-file-${note.type === "pptx" ? "powerpoint" : "pdf"}"></i></div>
                <div class="note-title">${escapeHtml(note.title)}</div>
                <div class="note-meta">
                    <span><i class="fas fa-book"></i> ${note.subject}</span>
                    <span><i class="fas fa-user"></i> ${note.uploader}</span>
                </div>
                <div class="note-meta">
                    <span><i class="fas fa-database"></i> ${note.fileSize}</span>
                    <span><i class="fas fa-calendar"></i> ${note.date}</span>
                </div>
                <button class="download-btn" onclick="downloadNote(${note.id})"><i class="fas fa-download"></i> Download (${note.downloads})</button>
            </div>
        `,
          )
          .join("");
      }

      function renderDashboard() {
        if (!currentUser) {
          showLoginModal();
          return;
        }

        const notes = getNotes();
        const myNotes = notes.filter((n) => n.uploaderId === currentUser.id);
        const downloadHistory = JSON.parse(
          localStorage.getItem("download_history") || "[]",
        ).filter((h) => h.userId === currentUser.id);

        document.getElementById("mainContent").innerHTML = `
            <div style="padding: 30px 0;">
                <div class="glass-card" style="padding: 30px; margin-bottom: 30px;">
                    <h2><i class="fas fa-user-circle"></i> Welcome, ${currentUser.name}!</h2>
                    <p>📧 ${currentUser.email} | 👤 Role: ${currentUser.role} | 📅 Joined: ${currentUser.joinDate}</p>
                    <button class="neon-btn" onclick="showUploadModal()" style="margin-top: 15px;"><i class="fas fa-upload"></i> Upload New Note</button>
                </div>

                <div class="dashboard-grid">
                    <div class="glass-card" style="padding: 25px;">
                        <h3><i class="fas fa-cloud-upload-alt"></i> My Uploads (${myNotes.length})</h3>
                        <div style="max-height: 350px; overflow-y: auto;">
                            ${myNotes.map((n) => `<div class="file-item"><strong>${n.title}</strong> (${n.subject})<br><small>📥 ${n.downloads} downloads</small><button class="download-btn" style="margin-top:8px;" onclick="downloadNote(${n.id})">Download</button></div>`).join("") || "<p>No notes uploaded yet.</p>"}
                        </div>
                    </div>
                    <div class="glass-card" style="padding: 25px;">
                        <h3><i class="fas fa-history"></i> Download History</h3>
                        <div style="max-height: 350px; overflow-y: auto;">
                            ${downloadHistory.map((h) => `<div class="file-item"><i class="fas fa-download"></i> ${h.title}<br><small>${h.date}</small></div>`).join("") || "<p>No downloads yet.</p>"}
                        </div>
                    </div>
                    <div class="glass-card" style="padding: 25px;">
                        <h3><i class="fas fa-chart-line"></i> Platform Stats</h3>
                        <p>📚 Total Notes: ${notes.length}</p>
                        <p>👥 Total Users: ${getUsers().length}</p>
                        <p>📥 Your Contributions: ${myNotes.length}</p>
                        <button class="neon-btn btn-outline" onclick="showSection('home')" style="margin-top:15px;">Browse All Notes →</button>
                    </div>
                </div>
            </div>
        `;
      }

      function renderFeatures() {
        document.getElementById("mainContent").innerHTML = `
            <div style="padding: 60px 0;" data-aos="fade-up">
                <h1 style="text-align:center; margin-bottom: 50px;">✨ Premium Features</h1>
                <div class="dashboard-grid">
                    ${[
                      {
                        icon: "fa-cloud-upload-alt",
                        title: "Upload Notes",
                        desc: "Share PDF, PPT, DOCX files easily",
                      },
                      {
                        icon: "fa-search",
                        title: "Smart Search",
                        desc: "Find notes by subject or title",
                      },
                      {
                        icon: "fa-book",
                        title: "Subject Categories",
                        desc: "Organized by programming, DBMS, etc",
                      },
                      {
                        icon: "fa-download",
                        title: "One Click Download",
                        desc: "Instant access to study materials",
                      },
                      {
                        icon: "fa-users",
                        title: "Community Sharing",
                        desc: "Learn from peers and teachers",
                      },
                      {
                        icon: "fa-chart-line",
                        title: "Analytics Dashboard",
                        desc: "Track downloads & contributions",
                      },
                    ]
                      .map(
                        (f) =>
                          `<div class="glass-card" style="padding: 30px; text-align:center;"><i class="fas ${f.icon}" style="font-size: 3rem; color:#00d9ff;"></i><h3 style="margin:15px 0;">${f.title}</h3><p>${f.desc}</p></div>`,
                      )
                      .join("")}
                </div>
            </div>
        `;
      }

      function renderAbout() {
        document.getElementById("mainContent").innerHTML = `
            <div style="padding: 60px 0; text-align:center;" data-aos="fade-up">
                <div class="glass-card" style="padding: 50px; max-width: 800px; margin: 0 auto;">
                    <i class="fas fa-graduation-cap" style="font-size: 4rem; color:#00d9ff;"></i>
                    <h2 style="margin: 20px 0;">About SmartNotes Platform</h2>
                    <p style="color:#cfcfcf; line-height:1.6;">SmartNotes is a centralized hub where students can share, discover, and download study notes. Our mission is to make education accessible and collaborative. Join thousands of students who are studying smarter with SmartNotes!</p>
                </div>
            </div>
        `;
      }

      function renderContact() {
        document.getElementById("mainContent").innerHTML = `
            <div style="padding: 60px 0;" data-aos="fade-up">
                <div class="glass-card" style="padding: 40px; max-width: 600px; margin: 0 auto;">
                    <h2 style="text-align:center; margin-bottom: 30px;"><i class="fas fa-envelope"></i> Contact Us</h2>
                    <input type="text" placeholder="Your Name" id="contactName">
                    <input type="email" placeholder="Your Email" id="contactEmail">
                    <textarea rows="4" placeholder="Your Message" id="contactMsg"></textarea>
                    <button class="neon-btn" style="width:100%;" onclick="alert('Message sent! We\\'ll get back to you soon.')">Send Message</button>
                    <div style="text-align:center; margin-top: 30px;">
                        <i class="fab fa-github" style="font-size: 28px; margin:0 10px; cursor:pointer;"></i>
                        <i class="fab fa-linkedin" style="font-size: 28px; margin:0 10px; cursor:pointer;"></i>
                        <i class="fab fa-twitter" style="font-size: 28px; margin:0 10px; cursor:pointer;"></i>
                    </div>
                </div>
            </div>
        `;
      }

      function showSection(section) {
        gsap.to("#mainContent", {
          opacity: 0,
          duration: 0.2,
          onComplete: () => {
            if (section === "home") renderHomePage();
            else if (section === "dashboard") renderDashboard();
            else if (section === "features") renderFeatures();
            else if (section === "about") renderAbout();
            else if (section === "contact") renderContact();
            gsap.to("#mainContent", { opacity: 1, duration: 0.5 });
            window.scrollTo({ top: 0, behavior: "smooth" });
          },
        });
      }

      // ========== NOTE FUNCTIONS ==========
      function downloadNote(noteId) {
        const notes = getNotes();
        const note = notes.find((n) => n.id === noteId);
        if (note) {
          note.downloads = (note.downloads || 0) + 1;
          saveNotes(notes);

          if (currentUser) {
            let history = JSON.parse(localStorage.getItem("download_history"));
            history.push({
              id: Date.now(),
              userId: currentUser.id,
              title: note.title,
              date: new Date().toLocaleString(),
            });
            localStorage.setItem("download_history", JSON.stringify(history));
          }

          alert(
            `📥 Downloading "${note.title}" (${note.fileName})\n\n✨ In production, file would download automatically.`,
          );
          if (currentUser && currentUser.role === "student")
            showSection("dashboard");
        }
      }

      let selectedFile = null;
      function showUploadModal() {
        if (!currentUser) {
          showLoginModal();
          return;
        }
        document.getElementById("uploadModal").style.display = "flex";
        selectedFile = null;
        document.getElementById("noteTitleUpload").value = "";
        document.getElementById("progressContainer").style.display = "none";
      }

      function closeModal() {
        document.getElementById("uploadModal").style.display = "none";
      }

      document
        .getElementById("uploadArea")
        ?.addEventListener("click", () =>
          document.getElementById("fileInput").click(),
        );
      document.getElementById("fileInput")?.addEventListener("change", (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) alert(`✅ Selected: ${selectedFile.name}`);
      });

      document
        .getElementById("confirmUploadBtn")
        ?.addEventListener("click", () => {
          const title = document.getElementById("noteTitleUpload").value;
          const subject = document.getElementById("noteSubjectUpload").value;
          if (!title || !selectedFile) {
            alert("Please fill title and select file!");
            return;
          }

          const progressContainer =
            document.getElementById("progressContainer");
          const progressFill = document.getElementById("progressFill");
          progressContainer.style.display = "block";
          let progress = 0;
          const interval = setInterval(() => {
            progress += 20;
            progressFill.style.width = progress + "%";
            if (progress >= 100) {
              clearInterval(interval);
              const notes = getNotes();
              const newNote = {
                id: Date.now(),
                title: title,
                subject: subject,
                uploader: currentUser.name,
                uploaderId: currentUser.id,
                fileSize:
                  (selectedFile.size / (1024 * 1024)).toFixed(2) + " MB",
                date: new Date().toISOString().slice(0, 10),
                fileName: selectedFile.name,
                type: selectedFile.name.split(".").pop(),
                downloads: 0,
              };
              notes.push(newNote);
              saveNotes(notes);
              setTimeout(() => {
                alert("✅ Note uploaded successfully!");
                closeModal();
                showSection("dashboard");
              }, 500);
            }
          }, 150);
        });

      function escapeHtml(str) {
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // ========== PARTICLES & INIT ==========
      function initParticles() {
        const canvas = document.getElementById("particles-canvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        for (let i = 0; i < 100; i++)
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: 1.5 + Math.random() * 3,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.2,
          });
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 217, 255, 0.4)`;
            ctx.fill();
          });
          requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener("resize", resize);
      }

      window.onload = () => {
        initParticles();
        setTimeout(
          () => document.getElementById("loading-overlay")?.remove(),
          600,
        );
        updateAuthUI();
        renderHomePage();
        gsap.fromTo(
          ".navbar",
          { y: -30, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.8 },
        );
      };

      // Expose functions globally
      window.showSection = showSection;
      window.downloadNote = downloadNote;
      window.closeModal = closeModal;
      window.showUploadModal = showUploadModal;
      window.showLoginModal = showLoginModal;
      window.closeLoginModal = closeLoginModal;
      window.showSignupModal = showSignupModal;
      window.closeSignupModal = closeSignupModal;
      window.logout = logout;
    </script>
